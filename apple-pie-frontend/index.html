<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Apple Pie — Comunidad para ingenieras</title>
  </head>
  <body>
    <noscript>
      <p style="padding: 2rem; font-family: system-ui, sans-serif">
        Activa JavaScript para ver Apple Pie.
      </p>
    </noscript>
    <div id="root">
      <div
        id="apple-pie-boot"
        style="
          box-sizing: border-box;
          max-width: 28rem;
          margin: 0 auto;
          padding: 2rem 1.25rem;
          font-family: Inter, system-ui, sans-serif;
          color: #3d2e2e;
          line-height: 1.5;
        "
      >
        <p style="font-weight: 600; margin: 0 0 0.5rem">Cargando Apple Pie…</p>
        <p style="margin: 0; font-size: 0.875rem; color: #7a6464">
          Este mensaje desaparece cuando React arranca. Si se queda así: usa la URL que muestra la terminal al ejecutar
          <code style="background: #f5efe6; padding: 0.1rem 0.35rem; border-radius: 4px">npm run dev</code>
          (por ejemplo <strong>http://localhost:5174</strong>). No abras este archivo con doble clic desde el explorador.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
